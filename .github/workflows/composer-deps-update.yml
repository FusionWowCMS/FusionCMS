name: Update Composer Dependencies (with vendor)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-composer-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP 8.3 with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl,mysqli,openssl,soap,mbstring,json,zip,zlib,libxml,dom,gmp,gd,intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | php
          sudo mv composer.phar /usr/local/bin/composer

      - name: Update dependencies
        run: composer update --no-interaction

      - name: Generate PR title from composer outdated
        id: pr_title
        run: |
          OUTDATED=$(composer outdated --direct --format=json)
          TITLE="Bump dependencies"
          if [ "$(echo "$OUTDATED" | jq '.installed | length')" -gt 0 ]; then
            TITLE="Bump:"
            echo "$OUTDATED" | jq -r '.installed[] | "- \(.name) from \(.version) to \(.latest)"' >> title.txt
            echo "title=$(cat title.txt)" >> $GITHUB_OUTPUT
          else
            echo "title=Update Composer dependencies" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: composer-update-vendor
          title: ${{ steps.pr_title.outputs.title }}
          body: |
            This PR updates PHP dependencies based on `composer.json` and includes the `vendor/` directory.
          base: main
          head: composer-update-vendor
